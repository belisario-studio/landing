<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: black; }
      .foreground { fill: white; }
      .symbol-fill { fill: black; }
      .symbol-stroke { stroke: white; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: white; }
      .foreground { fill: black; }
      .symbol-fill { fill: white; }
      .symbol-stroke { stroke: black; }
    }
  </style>
  <rect class="background" width="180" height="180" rx="37" />
  <circle class="symbol-stroke" cx="90" cy="90" r="50" stroke-width="6" fill="none" />
  <circle class="symbol-fill" cx="90" cy="90" r="12" />
</svg>
